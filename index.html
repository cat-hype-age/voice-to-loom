<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Talk to Loom</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 1.4em;
    margin: 20px 0 8px;
    color: #c4a35a;
  }
  .subtitle {
    font-size: 0.85em;
    color: #888;
    margin-bottom: 24px;
  }
  #status {
    font-size: 0.9em;
    color: #aaa;
    margin: 16px 0;
    min-height: 24px;
  }
  #mic-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #c4a35a;
    background: #2a2a4e;
    color: #c4a35a;
    font-size: 48px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
  }
  #mic-btn.listening {
    background: #c4a35a;
    color: #1a1a2e;
    box-shadow: 0 0 40px rgba(196, 163, 90, 0.4);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(196, 163, 90, 0.3); }
    50% { box-shadow: 0 0 50px rgba(196, 163, 90, 0.6); }
  }
  #transcript {
    width: 100%;
    max-width: 500px;
    min-height: 100px;
    background: #2a2a4e;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 16px;
    font-size: 1em;
    color: #ddd;
    line-height: 1.5;
    margin: 16px 0;
  }
  #send-btn {
    padding: 14px 40px;
    background: #c4a35a;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  #send-btn:hover { background: #d4b36a; }
  #send-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
  #history {
    width: 100%;
    max-width: 500px;
    margin-top: 24px;
  }
  .msg {
    padding: 12px 16px;
    margin: 8px 0;
    border-radius: 10px;
    font-size: 0.9em;
    line-height: 1.4;
  }
  .msg.sent {
    background: #2a3a2e;
    border: 1px solid #4a6a4a;
  }
  .msg.sent::before {
    content: "You: ";
    color: #c4a35a;
    font-weight: 600;
  }
  .msg.received {
    background: #2a2a4e;
    border: 1px solid #4a4a6a;
  }
  .msg.received::before {
    content: "Loom: ";
    color: #c4a35a;
    font-weight: 600;
  }
  .msg.status {
    background: transparent;
    border: none;
    color: #666;
    font-style: italic;
    text-align: center;
    font-size: 0.8em;
  }
</style>
</head>
<body>

<h1>Talk to Loom</h1>
<div class="subtitle">Voice → Slack → Council</div>

<button id="mic-btn" onclick="toggleListening()">🎤</button>
<div id="status">Tap the mic to start talking</div>

<div id="transcript" contenteditable="true" placeholder="Your message will appear here..."></div>

<div style="display:flex; gap:12px;">
  <button id="send-btn" onclick="sendMessage()" disabled>Send to Loom</button>
  <button onclick="document.getElementById('transcript').innerText=''; document.getElementById('send-btn').disabled=true; setStatus('Cleared. Tap mic to talk.');" style="padding:14px 24px; background:#444; color:#ccc; border:none; border-radius:8px; font-size:1em; cursor:pointer;">Clear</button>
</div>

<div id="history"></div>

<script>
const API_URL = 'https://nzmcbrhddyvfjeqwmmye.supabase.co/functions/v1/collaboration-api';

// Parse both keys from URL hash before clearing it
// Hash format: #key=SLACK_KEY&orkey=OPENROUTER_KEY
const hash = window.location.hash || '';
const hashParams = {};
hash.replace('#', '').split('&').forEach(p => {
  const [k, v] = p.split('=');
  if (k && v) hashParams[k] = decodeURIComponent(v);
});
if (hashParams.key) localStorage.setItem('loom_api_key', hashParams.key);
if (hashParams.orkey) localStorage.setItem('loom_or_key', hashParams.orkey);
if (hash) history.replaceState(null, '', window.location.pathname);

let API_KEY = localStorage.getItem('loom_api_key') || '';
let OR_KEY = localStorage.getItem('loom_or_key') || '';

// Only prompt if keys are truly missing (not on first QR load)
if (!API_KEY) API_KEY = prompt('Enter your Council API key:') || '';
if (API_KEY) localStorage.setItem('loom_api_key', API_KEY);
if (!OR_KEY) OR_KEY = prompt('Enter your OpenRouter API key (for voice):') || '';
if (OR_KEY) localStorage.setItem('loom_or_key', OR_KEY);

// Record audio with MediaRecorder, then send to Whisper for transcription
async function toggleListening() {
  const btn = document.getElementById('mic-btn');

  if (isListening) {
    // Stop recording
    isListening = false;
    btn.classList.remove('listening');
    mediaRecorder.stop();
    setStatus('Transcribing with Whisper...');
  } else {
    // Start recording
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        // Stop all tracks
        stream.getTracks().forEach(t => t.stop());

        if (audioChunks.length === 0) {
          setStatus('No audio captured. Try again.');
          return;
        }

        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

        // Send to OpenAI Whisper via OpenRouter
        try {
          const formData = new FormData();
          formData.append('file', audioBlob, 'voice.webm');
          formData.append('model', 'whisper-1');

          const resp = await fetch('https://api.openai.com/v1/audio/transcriptions', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + OR_KEY },
            body: formData
          });

          if (!resp.ok) {
            // Fallback: try OpenRouter's endpoint
            const resp2 = await fetch('https://openrouter.ai/api/v1/audio/transcriptions', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + OR_KEY },
              body: formData
            });
            if (!resp2.ok) throw new Error('Whisper API returned ' + resp2.status);
            var data = await resp2.json();
          } else {
            var data = await resp.json();
          }

          const text = data.text || '';
          if (text) {
            const box = document.getElementById('transcript');
            const existing = box.innerText.trim();
            box.innerText = existing ? existing + ' ' + text : text;
            document.getElementById('send-btn').disabled = false;
            setStatus('Got it! Tap mic to add more, or Send.');
          } else {
            setStatus('No speech detected. Try again.');
          }
        } catch(e) {
          setStatus('Whisper error: ' + e.message);
          console.error(e);
        }
      };

      mediaRecorder.start();
      isListening = true;
      btn.classList.add('listening');
      setStatus('Recording... tap mic when done speaking');
    } catch(e) {
      setStatus('Mic error: ' + e.message);
    }
  }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

async function sendMessage() {
  const text = document.getElementById('transcript').innerText.trim();
  if (!text) return;

  document.getElementById('send-btn').disabled = true;
  setStatus('Sending...');

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'x-api-key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'post_slack',
        text: text,
        username: 'Cat (Voice)'
      })
    });
    const data = await resp.json();

    if (data.success) {
      addToHistory(text, 'sent');
      document.getElementById('transcript').innerText = '';
      setStatus('Sent! Loom will respond on Slack.');
      // Start polling for responses
      if (!pollInterval) startPolling();
    } else {
      setStatus('Failed to send: ' + JSON.stringify(data));
    }
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
  document.getElementById('send-btn').disabled = false;
}

function addToHistory(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  document.getElementById('history').prepend(div);
}

async function checkForResponses() {
  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'x-api-key': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'list_slack', limit: 3 })
    });
    const data = await resp.json();

    for (const msg of (data.messages || []).reverse()) {
      const ts = msg.ts;
      if (lastMessageTs && ts <= lastMessageTs) continue;
      if (msg.username === 'Loom') {
        addToHistory(msg.text.substring(0, 300), 'received');
      }
    }
    if (data.messages && data.messages.length > 0) {
      lastMessageTs = data.messages[0].ts;
    }
  } catch(e) {}
}

function startPolling() {
  // Get current latest timestamp first
  checkForResponses();
  pollInterval = setInterval(checkForResponses, 10000); // Check every 10 seconds
}

// Allow editing the transcript and sending with Enter
document.getElementById('transcript').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Update send button state on manual edits
document.getElementById('transcript').addEventListener('input', () => {
  document.getElementById('send-btn').disabled = !document.getElementById('transcript').innerText.trim();
});
</script>

</body>
</html>
